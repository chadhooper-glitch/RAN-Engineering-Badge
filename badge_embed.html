<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAN Engineering &amp; Planning Badge</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Transparent background — blends into whatever Google Sites page color is */
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
    }

    .badge-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .badge-container a { display: block; }

    .badge-container img {
      cursor: pointer;
      width: 90vw;
      height: 90vw;
      max-width: 500px;
      max-height: 500px;
      display: block;
      transition: filter 0.3s ease, transform 0.3s ease;
    }

    .badge-container img:hover {
      filter:
        drop-shadow(0 0 12px rgba(0, 212, 255, 0.90))
        drop-shadow(0 0 30px rgba(0, 212, 255, 0.60))
        drop-shadow(0 0 60px rgba(0, 212, 255, 0.35));
      transform: scale(1.04);
    }

    .badge-label { display: none; }
  </style>
</head>
<body>

  <div class="badge-container">
    <a href="https://chadhooper-glitch.github.io/RAN-Engineering-Badge/ran_team_page.html" target="_blank">
      <img
        src="RAN_Engineering_Planning_Badge.svg"
        alt="National RAN Engineering &amp; Planning"
        width="100%"
        height="100%"
      >
    </a>
    <span class="badge-label">RAN Engineering &amp; Planning</span>
  </div>

</body>
</html>
