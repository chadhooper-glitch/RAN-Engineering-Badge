<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Budget by Submarket</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; }
</style>
</head>
<body>
<script type='module'>
  import { TableauViz, TableauEventType, FilterUpdateType } from 'https://nssanalytics.nss.vzwnet.com/javascripts/api/tableau.embedding.3.latest.min.js';

  const viz = new TableauViz();
  viz.src = 'https://nssanalytics.nss.vzwnet.com/t/Telcom-Cost-Mgmt/views/CapitalBudget/CapitalBudgetbySubmarket';
  viz.width = '1200';
  viz.height = '900';
  viz.toolbar = 'bottom';
  viz.hideTabs = false;
  document.body.appendChild(viz);

  viz.addEventListener(TableauEventType.FirstInteractive, async () => {
    const sheet = viz.workbook.activeSheet;
    await sheet.applyFilterAsync('BudgetFunction', ['CPG-Cell'], FilterUpdateType.Replace);
  });
</script>
</body>
</html>
