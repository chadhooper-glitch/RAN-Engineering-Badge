<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Budget by Submarket</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; display: flex; justify-content: center; }
</style>
</head>
<body>
<script type='module' src='https://nssanalytics.nss.vzwnet.com/javascripts/api/tableau.embedding.3.latest.min.js'></script>
<tableau-viz id='tableau-viz'
  src='https://nssanalytics.nss.vzwnet.com/t/Telcom-Cost-Mgmt/views/CapitalBudget/CapitalBudgetbySubmarket?BudgetFunction=CPG-Cell'
  width='1200'
  height='900'
  toolbar='bottom'>
</tableau-viz>

<script>
(function autoSignIn() {
  var viz = document.getElementById('tableau-viz');
  if (!viz) return;
  function tryClick(root) {
    var els = root.querySelectorAll('button, [role="button"], a');
    for (var i = 0; i < els.length; i++) {
      var t = (els[i].textContent || '').trim().toLowerCase();
      if (t.indexOf('sign in') >= 0 || t.indexOf('log in') >= 0) {
        els[i].click(); return true;
      }
    }
    return false;
  }
  var attempts = 0;
  var timer = setInterval(function() {
    attempts++;
    var found = tryClick(document);
    if (!found && viz.shadowRoot) found = tryClick(viz.shadowRoot);
    if (found || attempts > 40) clearInterval(timer);
  }, 250);
})();
</script>
</body>
</html>
